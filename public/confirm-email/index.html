<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifying your email — Jvala</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #F3F0FF 0%, #FDF2F8 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #D6006C; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #6B7280; font-size: 15px; }
  </style>
</head>
<body>
  <div style="text-align:center">
    <div class="spinner"></div>
    <p>Verifying your email…</p>
  </div>
  <script>
    // Supabase redirects here with tokens in the hash: /confirm-email#access_token=...
    var hash = window.location.hash || '';
    var params = hash.startsWith('#') ? hash.slice(1) : hash;
    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile && params && params.indexOf('access_token') !== -1) {
      // On mobile: deep link to the native app with the auth tokens
      // The app's useAuth hook will call setSession with these tokens
      window.location.replace('jvala://auth#' + params);

      // Fallback: if the app doesn't open in 2s, relay to HashRouter
      setTimeout(function() {
        window.location.replace('/#/confirm-email?' + params);
      }, 2000);
    } else {
      // On desktop: relay tokens into the HashRouter route
      window.location.replace('/#/confirm-email' + (params ? '?' + params : ''));
    }
  </script>
</body>
</html>
