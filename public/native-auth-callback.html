<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jvala</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FBF8F5;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container { text-align: center; max-width: 300px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #f0e0e8; border-top-color: #D6006C;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { font-size: 15px; font-weight: 600; color: #333; }
    .sub { font-size: 13px; color: #999; margin-top: 8px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p class="msg" id="msg">Finishing sign-in…</p>
    <p class="sub" id="hint">If this doesn't close, tap the X above.</p>
  </div>

  <script>
    (function() {
      var hash = window.location.hash;
      var search = window.location.search;
      var params = new URLSearchParams(search);
      var nonce = params.get('nonce');
      var code = params.get('code');
      var authError = params.get('error_description') || params.get('error');

      var SUPABASE_URL = 'https://rvhpwjhemwvvdtnzmobs.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2aHB3amhlbXd2dmR0bnptb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk3ODAyMDgsImV4cCI6MjA3NTM1NjIwOH0.2g2DDjiaxZh9TDRLPm8OhyxeNj4NkSX91YoJbdgFvNM';

      function showHint() {
        document.getElementById('hint').style.display = 'block';
      }

      function returnToApp(suffix) {
        var targetUrl = 'jvala://auth-callback' + (suffix || '');
        try { window.location.replace(targetUrl); } catch(e) {}
        setTimeout(function() { try { window.close(); } catch(e) {} }, 400);
        setTimeout(showHint, 2500);
      }

      function parseTokens(hashStr) {
        if (!hashStr || hashStr.length < 2) return null;
        var p = new URLSearchParams(hashStr.substring(1));
        var at = p.get('access_token');
        var rt = p.get('refresh_token');
        if (at && rt) return { access_token: at, refresh_token: rt };
        return null;
      }

      var tokens = parseTokens(hash);
      var relayPayload = { nonce: nonce };

      if (authError) relayPayload.error = authError;
      if (code) relayPayload.code = code;
      if (tokens) {
        relayPayload.access_token = tokens.access_token;
        relayPayload.refresh_token = tokens.refresh_token;
      }

      var hasPayload = !!authError || !!code || !!tokens;
      if (!hasPayload) {
        document.getElementById('msg').textContent = 'Something went wrong';
        document.getElementById('spinner').style.display = 'none';
        showHint();
        return;
      }

      var deepLinkSuffix = search + hash;

      if (!nonce) {
        returnToApp(deepLinkSuffix);
        return;
      }

      fetch(SUPABASE_URL + '/functions/v1/native-token-relay', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
        },
        body: JSON.stringify(relayPayload),
      })
      .then(function() { returnToApp(deepLinkSuffix); })
      .catch(function() { returnToApp(deepLinkSuffix); });
    })();
  </script>
</body>
</html>
